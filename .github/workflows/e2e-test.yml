name: E2E Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to test (optional, runs from source if empty)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: prod
  ELIXIR_VERSION: "1.19"
  OTP_VERSION: "28"
  ESS_S3_PORT: "9000"
  ESS_ADMIN_PORT: "4000"
  ESS_DATA_ROOT: /tmp/ex_storage_service/data
  ESS_ADMIN_USER: admin
  ESS_S3_AUTH_ENABLED: "true"
  ESS_MASTER_KEY: test-master-key-for-ci-only
  E2E_S3_ENDPOINT: http://localhost:9000
  E2E_ADMIN_ENDPOINT: http://localhost:4000
  E2E_STATE_FILE: /tmp/ex_storage_service/e2e-state.json
  AWS_DEFAULT_REGION: us-east-1
  PYTHONUNBUFFERED: "1"

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-prod-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-prod-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Install JS packages
        run: cd apps/ex_storage_service_web && bun install

      - name: Install e2e Python packages
        run: python3 -m pip install -r e2e/requirements.txt

      - name: Generate secret key base
        run: echo "SECRET_KEY_BASE=$(openssl rand -hex 64)" >> "$GITHUB_ENV"

      - name: Build assets
        run: mix assets.deploy

      - name: Compile
        run: mix compile

      - name: Reset e2e data root
        run: |
          rm -rf "$ESS_DATA_ROOT"
          mkdir -p "$ESS_DATA_ROOT"

      - name: Seed e2e IAM credentials
        run: E2E_GITHUB_ENV="$GITHUB_ENV" mix run --no-start e2e/scripts/seed_e2e.exs

      - name: Start application
        run: |
          mix phx.server > /tmp/ex_storage_service/app.log 2>&1 &
          echo "APP_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for S3 API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/health > /dev/null 2>&1; then
              echo "S3 API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "S3 API failed to start"
          cat /tmp/ex_storage_service/app.log || true
          exit 1

      - name: Wait for Admin UI to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/ > /dev/null 2>&1; then
              echo "Admin UI is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Admin UI failed to start"
          cat /tmp/ex_storage_service/app.log || true
          exit 1

      - name: Run signed S3 e2e exercise
        run: python3 e2e/s3_compat.py --phase exercise --state-file "$E2E_STATE_FILE"

      - name: Restart application
        run: |
          kill "$APP_PID" 2>/dev/null || true
          sleep 3
          mix phx.server > /tmp/ex_storage_service/app-restart.log 2>&1 &
          echo "APP_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for restarted S3 API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/health > /dev/null 2>&1; then
              echo "Restarted S3 API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Restarted S3 API failed to start"
          cat /tmp/ex_storage_service/app-restart.log || true
          exit 1

      - name: Verify persistence after restart
        run: python3 e2e/s3_compat.py --phase verify-persistence --state-file "$E2E_STATE_FILE"

      - name: Stop application
        if: always()
        run: |
          if [ -n "$APP_PID" ]; then
            kill "$APP_PID" 2>/dev/null || true
          fi
          cat /tmp/ex_storage_service/app.log || true
          cat /tmp/ex_storage_service/app-restart.log || true
